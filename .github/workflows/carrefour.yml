name: Carrefour Scraper Daily

on:
  schedule:
    # Ejemplo: Corre todos los días a las 09:00 UTC
    - cron: '0 9 * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias de Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Instalar Playwright y dependencias del sistema
        run: |
          npx playwright install --with-deps

      - name: Ejecutar el Scraper
        env:
          # Si usás variables de entorno como un token de Telegram
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: |
          python tu_script.py